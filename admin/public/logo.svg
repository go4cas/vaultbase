<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 52" width="210" height="52">
  <!-- Three arrows (quiver motif) -->
  <g fill="#f97316">
    <!-- Left arrow -->
    <polygon points="9.5,8 4.5,20 14.5,20"/>
    <rect x="8.25" y="20" width="2.5" height="24" rx="1.25"/>
    <!-- Centre arrow (tallest) -->
    <polygon points="20.5,0 15.5,12 25.5,12"/>
    <rect x="19.25" y="12" width="2.5" height="32" rx="1.25"/>
    <!-- Right arrow -->
    <polygon points="31.5,8 26.5,20 36.5,20"/>
    <rect x="30.25" y="20" width="2.5" height="24" rx="1.25"/>
    <!-- Binding band -->
    <rect x="4.5" y="40" width="33" height="5" rx="2.5" opacity="0.35"/>
  </g>
  <!-- Wordmark -->
  <text
    x="50"
    y="37"
    font-family="'Audiowide', 'Orbitron', ui-monospace, monospace"
    font-size="26"
    font-weight="700"
    fill="#f97316"
    letter-spacing="0.5"
  >Quiver</text>
</svg>
